name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate Python modules
        run: python -B -m py_compile backend/app.py backend/content.py backend/state.py scripts/export_static.py

      - name: Validate frontend syntax
        run: node --check frontend/app.js

      - name: Export static site
        run: python -B scripts/export_static.py

      - name: Validate static curriculum
        run: python -B -c "import json; data=json.load(open('dist/data/curriculum.json', encoding='utf-8')); assert len(data['lessons']) == 22; assert len([m for l in data['lessons'] for m in l.get('math', [])]) == 29"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
