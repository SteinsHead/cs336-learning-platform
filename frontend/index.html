<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CS336 从零学习平台</title>
    <link rel="stylesheet" href="styles.css?v=20260710d" />
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div>
          <p class="eyebrow">Stanford CS336 Spring 2026</p>
          <h1>从零理解语言模型</h1>
        </div>
        <div class="topbar-actions">
          <label class="search-box" for="searchInput">
            <span aria-hidden="true">⌕</span>
            <input id="searchInput" type="search" placeholder="搜索 token、attention、RLHF..." />
          </label>
          <div class="progress-pill">
            <span id="progressText">0 / 0</span>
            <div class="progress-track"><div id="progressBar"></div></div>
          </div>
          <button id="accountOpen" class="account-pill" type="button" aria-haspopup="dialog" aria-controls="accountModal">
            <span id="accountStatusDot" class="account-status-dot" data-mode="local" aria-hidden="true"></span>
            <span class="account-pill-copy">
              <strong id="accountStatusText">账号 / 登录</strong>
              <small id="accountStatusHint">本机保存</small>
            </span>
          </button>
        </div>
      </header>

      <main class="layout">
        <aside class="sidebar">
          <div class="section-heading">
            <span>学习阶段</span>
            <div class="sidebar-actions">
              <button id="mobileCurriculumToggle" class="ghost-button mobile-curriculum-toggle" type="button" aria-expanded="false" aria-controls="phaseList">展开目录</button>
              <button id="resetProgress" class="ghost-button" type="button">重置</button>
            </div>
          </div>
          <div id="phaseList" class="phase-list"></div>
        </aside>

        <section class="workspace">
          <div class="workspace-head">
            <div>
              <p id="lessonMeta" class="eyebrow">Lecture</p>
              <h2 id="lessonTitle">加载中...</h2>
            </div>
            <button id="markDone" class="primary-button" type="button">标记完成</button>
          </div>

          <nav class="tabs" aria-label="课程内容">
            <button class="tab active" data-tab="overview" type="button">总览</button>
            <button class="tab" data-tab="source" type="button">讲义</button>
            <button class="tab" data-tab="math" type="button">数学</button>
            <button class="tab" data-tab="code" type="button">代码</button>
            <button class="tab" data-tab="practice" type="button">实践</button>
            <button class="tab" data-tab="map" type="button">知识图</button>
            <button class="tab" data-tab="mastery" type="button">标准</button>
            <button class="tab" data-tab="system" type="button">闭环</button>
          </nav>

          <div id="lessonBody" class="lesson-body"></div>
        </section>

        <aside class="utility">
          <section class="panel account-panel">
            <div class="panel-title">
              <span>账号与云同步</span>
              <span id="cloudModeBadge" class="status-badge">本机</span>
            </div>
            <div id="accountPanel" class="account-stack"></div>
          </section>

          <section class="panel">
            <div class="panel-title">
              <span>学习控制台</span>
              <button id="refreshDashboard" class="ghost-button" type="button">刷新</button>
            </div>
            <div id="nextActionPanel" class="console-stack"></div>
            <div class="console-divider"></div>
            <div class="panel-title compact-title"><span>掌握证据</span></div>
            <textarea id="evidenceText" class="plain-editor" placeholder="至少写清：为什么成立、公式或 shape、代码/实验对应点，以及一个适用边界。"></textarea>
            <div class="lab-row">
              <label for="evidenceConfidence">信心</label>
              <input id="evidenceConfidence" type="range" min="0" max="3" step="1" value="2" />
            </div>
            <button id="saveEvidence" class="secondary-button" type="button">提交证据</button>
            <div class="console-divider"></div>
            <div class="panel-title compact-title"><span>本讲笔记</span></div>
            <textarea id="notesText" class="plain-editor compact-editor" placeholder="记录疑问、错题、讲义页码和自己的解释。"></textarea>
            <button id="saveNotes" class="ghost-button" type="button">保存笔记</button>
            <div class="console-divider"></div>
            <div class="panel-title compact-title"><span>闭卷回忆</span></div>
            <textarea id="reviewRecallText" class="plain-editor compact-editor" placeholder="先不看讲义，写出本讲核心公式、代码路径和一个易错点，再评价难度。"></textarea>
            <div class="review-buttons">
              <button data-review="again" type="button">重来</button>
              <button data-review="hard" type="button">困难</button>
              <button data-review="good" type="button">掌握</button>
              <button data-review="easy" type="button">轻松</button>
            </div>
          </section>

          <section class="panel">
            <div class="panel-title">
              <span>本讲实验</span>
              <select id="labSelect" aria-label="选择实验"></select>
            </div>
            <div id="labPanel"></div>
          </section>

          <section class="panel">
            <div class="panel-title">
              <span>主题解释</span>
            </div>
            <div class="explain-form">
              <input id="explainInput" type="text" placeholder="输入一个主题，例如 KV cache" />
              <button id="explainButton" class="secondary-button" type="button">解释</button>
            </div>
            <div id="explainResult" class="explain-result"></div>
          </section>

          <section class="panel">
            <div class="panel-title">
              <span>本讲自测</span>
              <select id="quizSelect" aria-label="选择自测"></select>
            </div>
            <div id="quizPanel"></div>
          </section>
        </aside>
      </main>
      <div id="accountModal" class="account-modal" role="dialog" aria-modal="true" aria-labelledby="accountModalTitle" hidden>
        <div class="account-dialog">
          <div class="account-dialog-head">
            <div>
              <p class="eyebrow">Learning Account</p>
              <h2 id="accountModalTitle">账号与学习进度</h2>
            </div>
            <button class="icon-button" type="button" data-account-close aria-label="关闭账号窗口">&times;</button>
          </div>
          <div id="accountModalBody" class="account-stack account-modal-body"></div>
        </div>
      </div>
    </div>
    <script src="config.js"></script>
    <script src="app.js?v=20260710e" type="module"></script>
  </body>
</html>
