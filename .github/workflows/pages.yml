name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Validate Python modules
        run: python -B -m py_compile backend/app.py backend/assessments.py backend/content.py backend/state.py scripts/export_static.py

      - name: Validate frontend syntax
        run: |
          node --check frontend/app.js
          node --check frontend/code-highlight.js
          node --check frontend/pyodide-worker.js

      - name: Run Python tests
        run: python -B -m unittest discover -v

      - name: Run frontend tests
        run: node --test tests/*.test.mjs

      - name: Install PDF renderer
        run: python -m pip install pymupdf

      - name: Export static site
        run: python -B scripts/export_static.py

      - name: Inject runtime config
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ vars.SUPABASE_ANON_KEY }}
          SUPABASE_AUTH_REDIRECT_URL: ${{ vars.SUPABASE_AUTH_REDIRECT_URL }}
        run: |
          python -B - <<'PY'
          import json
          import os
          from pathlib import Path

          config = {
              "supabaseUrl": os.environ.get("SUPABASE_URL", ""),
              "supabaseAnonKey": os.environ.get("SUPABASE_ANON_KEY", ""),
              "supabaseAuthRedirectUrl": os.environ.get("SUPABASE_AUTH_REDIRECT_URL", ""),
              "supabaseModuleUrl": "https://esm.sh/@supabase/supabase-js@2",
          }
          Path("dist/config.js").write_text(
              "window.CS336_CONFIG = " + json.dumps(config, ensure_ascii=False, indent=2) + ";\n",
              encoding="utf-8",
          )
          PY

      - name: Validate static curriculum
        run: |
          python -B - <<'PY'
          import json
          import xml.etree.ElementTree as ET

          with open("dist/data/curriculum.json", encoding="utf-8") as file:
              data = json.load(file)
          lesson_ids = {lesson["id"] for lesson in data["lessons"]}
          assert len(lesson_ids) == 22
          assert {quiz["lesson_id"] for quiz in data["quizzes"]} == lesson_ids
          assert {lesson_id for task in data["practice_studios"] for lesson_id in task["lesson_ids"]} == lesson_ids
          math_items = [item for lesson in data["lessons"] for item in lesson.get("math", [])]
          assert len(math_items) >= 29
          for item in math_items:
              ET.fromstring(item["mathml"])
          for lesson in data["lessons"]:
              material = lesson["official_material"]
              if material["kind"] == "slides-pdf":
                  assert material["page_count"] > 0, lesson["id"]
          PY

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
